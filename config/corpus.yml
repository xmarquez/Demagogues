periods:
  sample_min_year: 1700
  sample_max_year: 2010
  sample_slice_size: 10
  period_name: decade

corpora:
  - id: hathi_all
    filter: "TRUE"
    description: "All HathiTrust volumes (language restriction handled downstream)."

worksets:
  method: auto

corpus_stats:
  # Year bounds for the per-feature bookworm corpus-stats queries (word counts,
  # words-per-million, text counts, text percent).
  lims: [1700, 2020]

samples:
  sample_max_vols: [40, 500]
  sample_type: [unrestricted, restricted]
  sample_multiplier: [Inf, 1]
  # Volume deduplication before per-period sampling. Default `none` keeps
  # multiple editions/copies, treating multiplicity as a popularity signal.
  # `bib_key` keeps one volume per HathiTrust bibliographic key; `author_title`
  # keeps one per author+title. Use the latter two only as robustness checks.
  # Values: none | bib_key | author_title
  dedupe: none
  # Number of independent volume-sample replicates for uncertainty
  # quantification (P3). Rep 1 always exists (byte-identical target names); reps
  # 2..n re-run the sample -> files -> dfm -> split -> model -> weights ->
  # kl/entropy chain with fresh samples (targets derives each replicate's RNG
  # seed from its rep-labelled target name). Default 1 = no replication; run
  # configs override (e.g. n_repeats: 5) so the expensive replication is opt-in.
  n_repeats: 1
  # Which sample rows get reps 2..n. `headline` (default) replicates only the
  # model-bearing restricted chain at the maximum `sample_max_vols` cap; `all`
  # replicates every sample row. Values: headline | all
  repeats_scope: headline

dfm:
  vocab_size: [30000]
  pos_pattern: ["NN|VB|JJ"]
  include_pattern: ["^\\p{L}+$"]
  pages_contain: [".", "{feature_pages_contain}"]
  min_length: [2]
  page_language: ["en"]
  min_sentence_count: [3]
  to_lower: [true, false]

weights:
  # How signed model weights are turned into a probability-like distribution for
  # entropy/KL/JSD (see normalize_weights()). Values: positive | shift | softmax.
  normalization: positive

kl:
  # When true, additionally compute KL on the across-period vocabulary
  # intersection (common vocabulary) for the appendix. The union-vocabulary KL
  # remains the headline measure regardless.
  common_vocab_robustness: false

predictive_models:
  task: [classification]
  weights: [ppmi, tfidf, none]
  # `engines` accepts two forms (mixable). Scalar form uses each engine's
  # hard-coded defaults:
  #   engines: [naivebayes, glmnet, LiblineaR, xgboost]
  # Mapping form attaches per-engine hyperparameters (merged over the defaults):
  #   engines:
  #     - name: glmnet
  #       params: { alpha: 0.5, nfolds: 10, lambda_rule: lambda.1se }
  #     - name: xgboost
  #       params: { nrounds: 200, eta: 0.1, max_depth: 6 }
  # Non-default params add a short hash to the engine's target names; scalar-form
  # engines keep their historical target names. Leave scalar unless tuning.
  # xgboost defaults were set from the 2026-07-07 tuning study (see
  # Paper/Appendix_Methods.qmd and data/tuning_study_*.csv): depth=6/eta=0.05
  # matches the best AUC/kappa within noise and is markedly better calibrated
  # than the old depth=12/eta=0.1.
  engines:
    - naivebayes
    - glmnet
    - LiblineaR
    - name: xgboost
      params: { max_depth: 6, eta: 0.05 }

svd:
  weights: [ppmi, tfidf]
  dims: [50]

ppmi:
  funs: [feature_ppmi, ppmi_similarities]

topic_models:
  K: [20]
  reduced_vocab: 50

graphs:
  patterns: [".","(_nn|_NN)","(_vb|_VB)","(_jj|_JJ)","ism_","^[A-Z].+NN"]
  collapse_cased: [true,true,true,true,true,false]
  max_per_slice: 8
  max_terms: 60
  tracked_top_n: 10
  exclude_fiction: true

# graph_doc controls which chunks the *run-level graph browser document*
# (run_graph_qmd / run_graph_html) emits. It NEVER changes which graph_object
# targets are built, so it does not invalidate science targets - it only trims
# the rendered document (the force-directed graph chunks dominate its runtime;
# rendering all 5 reps nearly blew the cluster walltime - see IMPROVEMENT_PLAN W4).
# Filtering happens in write_run_graph_qmd() before qmd emission.
#   reps:         sample replicates to show. Default [1] (rep 1 = headline);
#                 reps 2-5 exist for replicate-range stats, not eyeballing.
#                 Use `all` to render every replicate.
#   pos:          feature-type subset, any of: all_terms, nouns, verbs,
#                 adjectives, ism, uppercase_nouns. Default `all`.
#   weight_types: weight families, any of: predictive, ppmi, svd. Default `all`.
#   engines:      predictive engines, any of: glmnet, LiblineaR, naivebayes,
#                 xgboost (only narrows predictive rows). Default `all`.
#   periods:      [min, max] decade range for the time-series chunks (performance
#                 and weight trajectories); graphs span all periods. Default `all`.
# Set `graph_doc: all` (a bare scalar) to render every chunk for full QA.
graph_doc:
  reps: [1]
  pos: all
  weight_types: all
  engines: all
  periods: all

outputs: [ingest, dfm, model, graph, corpus_stats, document]

profiles:
  explore:
    predictive_models:
      engines: [glmnet, naivebayes]
      weights: [ppmi, tfidf]
    graphs:
      patterns: [".","(_nn|_NN)","(_vb|_VB)"]
      collapse_cased: [true,true,true]
