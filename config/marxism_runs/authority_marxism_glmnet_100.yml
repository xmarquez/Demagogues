id: authority_marxism_glmnet_100
description: "Authority run over the annotated Marx/Engels corpus: up to 100 positive segments per decade with matched negative segments; fits glmnet, LiblineaR, naive Bayes, and xgboost classifiers."
feature: authority
source: marx_engels
outputs: [marxism_ingest, marxism_segments, marxism_audit, marxism_dfm, marxism_model, marxism_graph]

periods:
  sample_min_year: 1830
  sample_max_year: 1900
  sample_slice_size: 10
  period_name: decade

samples:
  sample_max_segments: 100
  negative_multiplier: 1
  min_positive_segments_per_period: 8
  min_negative_segments_per_period: 8

predictive_models:
  task: [classification]
  weights: [ppmi]
  engines: [glmnet, LiblineaR, naivebayes, xgboost]
