id: full_democracy
description: "Full democracy pipeline using the shared corpus defaults."
features: [democracy]
# `document` is intentionally omitted: the tar_quarto targets read the store
# with tar_read_raw(<string>), which tarchetypes cannot detect as a dependency,
# so they render at pipeline start (before their inputs exist) instead of last.
# Compute everything here, fetch, and render the paper/appendices locally. Re-add
# `document` only after the quarto targets gain explicit target dependencies
# (Phase 4 / W1). error="null" on those targets (see _targets.R) is a backstop.
outputs: [ingest, dfm, model, graph, corpus_stats]
samples:
  # Five independent volume samples for the headline (restricted, max-vols)
  # chain, for uncertainty bands on entropy/KL/JSD (P3). Deep-merges with the
  # corpus.yml samples block; all other sample settings inherit.
  n_repeats: 5
graph_doc:
  # Restrict the run-level graph browser doc to the fast, interesting subset:
  # rep-1 (headline) adjective + ism graphs for the predictive-model weights.
  # Deep-merges with corpus.yml graph_doc; unset axes inherit (weight_types/
  # engines/periods stay `all` unless overridden). Rendering every rep x pos x
  # weight-family chunk took ~2.5 h and nearly blew the cluster walltime (W4).
  # Use `graph_doc: all` for a full-QA render of every chunk.
  reps: [1]
  pos: [adjectives, ism]
  weight_types: [predictive]
