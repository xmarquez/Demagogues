windows:
  size: 50

weights:
  min_count: 2

ppmi:
  min_count: 10
  min_corpus_count: 30
  base: 2

svd:
  dims: 5
  weight: ppmi
  base: 10
  min_term_count: 2
  top_n: 12

graphs:
  tracked_terms: []
  top_n: 12

outputs: [latin_ingest, latin_windows, latin_weights, latin_graph]
