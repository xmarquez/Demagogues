sources:
  perseus:
    repo_url: "https://github.com/PerseusDL/canonical-latinLit.git"
    local_dir: "data/perseus/canonical-latinLit"
    ref: "b2a135df22f812afc622e7e14d30889718c252ee"
    update: false
    edition_language: "lat"
    max_files:

metadata:
  default_period: classical
  author_periods:
    - pattern: "Plautus|Titus Maccius"
      period: republican
      date_year: -200
    - pattern: "Terence|Publius Terentius"
      period: republican
      date_year: -160
    - pattern: "Cicero|Tullius"
      period: republican
      date_year: -50
    - pattern: "Caesar|Julius"
      period: republican
      date_year: -50
    - pattern: "Sallust"
      period: republican
      date_year: -40
    - pattern: "Lucretius|Catullus|Varro"
      period: republican
      date_year: -50
    - pattern: "Vergil|Virgil|Horace|Ovid|Propertius|Tibullus|Livy"
      period: augustan
      date_year: 0
    - pattern: "Seneca|Lucan|Petronius|Persius|Quintilian|Pliny|Tacitus|Suetonius|Juvenal|Martial|Statius|Silius|Valerius Flaccus"
      period: imperial
      date_year: 100
    - pattern: "Apuleius|Gellius|Tertullian|Minucius|Cyprian"
      period: late_antique
      date_year: 200
    - pattern: "Ammianus|Augustine|Jerome|Prudentius|Boethius"
      period: late_antique
      date_year: 400

periods:
  definitions:
    - id: republican
      label: "Republican"
      min_year: -250
      max_year: -27
    - id: augustan
      label: "Augustan"
      min_year: -27
      max_year: 14
    - id: imperial
      label: "Imperial"
      min_year: 14
      max_year: 180
    - id: late_antique
      label: "Late antique"
      min_year: 180
      max_year: 600
    - id: classical
      label: "Classical/undated Perseus"
      min_year: -250
      max_year: 600

