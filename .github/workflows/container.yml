name: Build container image

# Builds the reproducible R environment and pushes it to the GitHub Container
# Registry (ghcr.io/xmarquez/demagogues). Raapoi pulls this image with
# `singularity pull docker://ghcr.io/xmarquez/demagogues:latest`.
#
# NOTE: the first package GHCR publishes defaults to PRIVATE. After the first
# successful run, flip the package visibility to Public in
# GitHub -> your profile -> Packages -> demagogues -> Package settings,
# otherwise `singularity pull` on the cluster will need registry credentials.

on:
  push:
    branches: [master]
    paths:
      - "renv.lock"
      - "docker/**"
      - ".github/workflows/container.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xmarquez/demagogues

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            GITHUB_PAT=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.vars.outputs.sha_short }}
          # Registry-backed layer cache keeps rebuilds cheap when only renv.lock
          # changes slightly. Harmless if the cache image does not yet exist.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
